<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Yedinak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Martian+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0b09;
      --text: #e8e2d9;
      --muted: #7a7166;
      --accent: #c9a96e;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: clamp(40px, 8vw, 100px);
      overflow: hidden;
      cursor: default;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
      animation: grain 8s steps(10) infinite;
    }

    @keyframes grain {
      0%  { transform: translate(0, 0); }
      10% { transform: translate(-2%, -3%); }
      20% { transform: translate(3%, 2%); }
      30% { transform: translate(-1%, 4%); }
      40% { transform: translate(4%, -1%); }
      50% { transform: translate(-3%, 3%); }
      60% { transform: translate(2%, -4%); }
      70% { transform: translate(-4%, 1%); }
      80% { transform: translate(1%, -2%); }
      90% { transform: translate(-2%, 4%); }
      100%{ transform: translate(0, 0); }
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(201,169,110,0.055) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      width: 100%;
    }

    /* Eyebrow line */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: clamp(16px, 3vw, 32px);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .eyebrow-line {
      width: 40px;
      height: 1px;
      background: var(--accent);
    }

    .eyebrow-text {
      font-family: 'Martian Mono', monospace;
      font-size: clamp(9px, 1.1vw, 11px);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* Name */
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(64px, 12vw, 160px);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    h1 .first {
      display: block;
      font-style: italic;
    }

    h1 .last {
      display: block;
    }

    /* Divider */
    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--muted), transparent);
      margin: clamp(24px, 4vw, 48px) 0;
      animation: expandLine 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    @keyframes expandLine {
      to { width: min(480px, 60vw); }
    }

    /* Email */
    .email-wrap {
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .email-label {
      font-family: 'Martian Mono', monospace;
      font-size: clamp(8px, 1vw, 10px);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .email-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      color: var(--accent);
      text-decoration: none;
      transition: background 0.4s ease, color 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .email-link svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .email-link:hover {
      background: var(--accent);
      color: var(--bg);
      transform: scale(1.1);
    }

    /* Year mark */
    .year {
      position: fixed;
      bottom: clamp(24px, 4vw, 48px);
      right: clamp(24px, 4vw, 48px);
      font-family: 'Martian Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      body {
        justify-content: flex-end;
        padding-bottom: clamp(48px, 12vw, 80px);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span class="eyebrow-text">Entrepreneur · Builder</span>
    </div>

    <h1>
      <span class="first">John</span>
      <span class="last">Yedinak</span>
    </h1>

    <div class="divider"></div>

    <div class="email-wrap">
      <p class="email-label">Get in touch</p>
      <a class="email-link" href="/cdn-cgi/l/email-protection#39535651577953565157405c5d50575852175a5654"><span class="__cf_email__" data-cfemail="640e0b0c0a240e0
